name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Flask API
        uses: docker/build-push-action@v5
        with:
          context: ./app/flask-api
          push: true
          tags: saramir04/flask-api:latest

      - name: Build and Push Nginx Proxy
        uses: docker/build-push-action@v5
        with:
          context: ./app/nginx
          push: true
          tags: saramir04/nginx-proxy:latest
